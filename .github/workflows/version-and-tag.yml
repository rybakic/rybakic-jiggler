name: Auto Version And Tag

on:
  push:
    branches:
      - '**'

permissions:
  contents: write
  actions: write

jobs:
  version-and-tag:
    if: ${{ startsWith(github.ref, 'refs/heads/') && github.ref_name == github.event.repository.default_branch && github.actor != 'github-actions[bot]' && !startsWith(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Determine bump type
        id: bump
        shell: bash
        run: |
          set -euo pipefail

          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || true)
          if [ -n "$LAST_TAG" ]; then
            COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=%B)
          else
            COMMITS=$(git log --pretty=%B)
          fi

          BUMP="patch"

          if echo "$COMMITS" | grep -Eq 'BREAKING CHANGE|!:'; then
            BUMP="major"
          elif echo "$COMMITS" | grep -Eq '(^|\n)feat(\(.+\))?:'; then
            BUMP="minor"
          fi

          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"

      - name: Bump version
        run: npm version ${{ steps.bump.outputs.bump }} --no-git-tag-version

      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and tag
        shell: bash
        run: |
          set -euo pipefail
          VERSION='${{ steps.version.outputs.version }}'

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          git add package.json package-lock.json
          git commit -m "chore(release): v${VERSION}"
          git tag "v${VERSION}"

      - name: Push changes and tag
        run: |
          git push
          git push --tags

      - name: Trigger desktop build workflow for tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run build-desktop.yml --ref v${{ steps.version.outputs.version }}
